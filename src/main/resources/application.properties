# ============================================

# ============================================
# \u00ec\u0095\u00a0\u00ed\u0094\u008c\u00eb\u00a6\u00ac\u00ec\u00bc\u0080\u00ec\u009d\u00b4\u00ec\u0085\u0098 \u00ec\u00a0\u0095\u00eb\u00b3\u00b4
# ============================================
app.name=LMS
app.version=1.0.0
app.description=Learning Management System (eGovFrame 4.2.0)

# ============================================
# \u00eb\u008d\u00b0\u00ec\u009d\u00b4\u00ed\u0084\u00b0\u00eb\u00b2\u00a0\u00ec\u009d\u00b4\u00ec\u008a\u00a4 \u00ec\u0084\u00a4\u00ec\u00a0\u0095
# ============================================
db.driver=org.mariadb.jdbc.Driver
db.url=jdbc:mariadb://localhost:3306/lms_my?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
db.username=root
db.password=kwagsi2659

# Connection Pool \u00ec\u0084\u00a4\u00ec\u00a0\u0095
db.initialSize=5
db.maxTotal=20
db.maxIdle=10
db.minIdle=5
db.maxWaitMillis=30000

# ============================================
# Redis 설정 (세션 클러스터링)
# ============================================
redis.host=210.101.173.246
redis.port=6379
redis.password=1q2w3e4r!
redis.database=0

# ============================================
# JWT \u00ec\u0084\u00a4\u00ec\u00a0\u0095
# ============================================
jwt.secret=change-me-in-production-environment-please
jwt.expiration=3600000

# ============================================
# \u00ed\u008c\u008c\u00ec\u009d\u00bc \u00ec\u0097\u0085\u00eb\u00a1\u009c\u00eb\u0093\u009c \u00ec\u0084\u00a4\u00ec\u00a0\u0095
# ============================================
file.upload.dir=/data/uploads
file.upload.max-size=104857600
file.upload.allowed-extensions=mp4,avi,mov,wmv,pdf,doc,docx,xls,xlsx,ppt,pptx,jpg,png,gif

# ============================================
# \u00eb\u00a1\u009c\u00ea\u00b9\u0085 \u00ec\u0084\u00a4\u00ec\u00a0\u0095
# ============================================
logging.level.root=INFO
logging.level.kr.co.lms=INFO
logging.level.kr.co.lms.service.impl.EncryptionServiceImpl=INFO
logging.level.kr.co.lms.service.impl.UserServiceImpl=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%-5p] %c{1} - %m%n

# ============================================
# \u00eb\u00b3\u00b4\u00ec\u0095\u0088 \u00ec\u0084\u00a4\u00ec\u00a0\u0095
# ============================================
security.password.min-length=10
security.password.require-uppercase=true
security.password.require-lowercase=true
security.password.require-digit=true
security.password.require-special-char=true
security.login.failure.max-attempts=5
security.login.failure.lock-duration-minutes=30

# ============================================
# CORS \u00ec\u0084\u00a4\u00ec\u00a0\u0095
# ============================================
cors.allowed-origins=http://localhost:3000,http://localhost:3001
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed-headers=*
cors.max-age=3600

# ============================================
# \u00ec\u0095\u0094\u00ed\u0098\u00b8\u00ed\u0099\u0094 \u00ec\u0084\u00a4\u00ec\u00a0\u0095 (AES-256-GCM)
# ============================================
# \u00ec\u0095\u008c\u00ea\u00b3\u00a0\u00eb\u00a6\u00ac\u00ec\u00a6\u0098: AES-256-GCM (KISA \u00ea\u00b6\u008c\u00ec\u009e\u00a5 \u00ed\u0091\u009c\u00ec\u00a4\u0080)
encryption.algorithm=AES/GCM/NoPadding
# \u00ed\u0082\u00a4 \u00ea\u00b8\u00b8\u00ec\u009d\u00b4: 256\u00eb\u00b9\u0084\u00ed\u008a\u00b8
encryption.key-size=256
# GCM \u00ed\u0083\u009c\u00ea\u00b7\u00b8 \u00ea\u00b8\u00b8\u00ec\u009d\u00b4: 128\u00eb\u00b9\u0084\u00ed\u008a\u00b8
encryption.gcm-tag-length=128
# GCM IV \u00ea\u00b8\u00b8\u00ec\u009d\u00b4: 96\u00eb\u00b9\u0084\u00ed\u008a\u00b8 (12\u00eb\u00b0\u0094\u00ec\u009d\u00b4\u00ed\u008a\u00b8)
encryption.gcm-iv-length=12
# \u00ed\u0082\u00a4 \u00ec\u00a0\u0080\u00ec\u009e\u00a5\u00ec\u0086\u008c: DB (\u00ec\u0095\u0088\u00ec\u00a0\u0084\u00ec\u0084\u00b1+\u00ec\u009a\u00b4\u00ec\u0098\u0081\u00ec\u0084\u00b1 \u00ea\u00b7\u00a0\u00ed\u0098\u0095)
encryption.key-storage=database
# \u00ec\u0095\u0094\u00ed\u0098\u00b8\u00ed\u0099\u0094 \u00ec\u00a0\u0095\u00ec\u00b1\u0085: \u00ed\u0085\u008c\u00eb\u0084\u008c\u00ed\u008a\u00b8\u00eb\u00b3\u0084 \u00eb\u008f\u0085\u00eb\u00a6\u00bd \u00ed\u0082\u00a4 \u00ea\u00b4\u0080\u00eb\u00a6\u00ac
encryption.policy=tenant-based
# \u00ed\u0082\u00a4 \u00eb\u00a1\u009c\u00ed\u0085\u008c\u00ec\u009d\u00b4\u00ec\u0085\u0098 \u00ec\u00a0\u0095\u00ec\u00b1\u0085: \u00ec\u0088\u0098\u00eb\u008f\u0099 (\u00ed\u0095\u0084\u00ec\u009a\u0094\u00ec\u008b\u009c \u00ea\u00b4\u0080\u00eb\u00a6\u00ac\u00ec\u009e\u0090\u00ea\u00b0\u0080 \u00ec\u0088\u0098\u00eb\u008f\u0099 \u00eb\u00a1\u009c\u00ed\u0085\u008c\u00ec\u009d\u00b4\u00ec\u0085\u0098)
encryption.rotation-policy=manual

# ============================================
# \u00ea\u00b0\u009c\u00ec\u009d\u00b8\u00ec\u00a0\u0095\u00eb\u00b3\u00b4 \u00ec\u0095\u0094\u00ed\u0098\u00b8\u00ed\u0099\u0094 \u00eb\u008c\u0080\u00ec\u0083\u0081
# ============================================
# email: \u00ec\u009d\u00b4\u00eb\u00a9\u0094\u00ec\u009d\u00bc (\u00ec\u0096\u0091\u00eb\u00b0\u00a9\u00ed\u0096\u00a5 \u00ec\u0095\u0094\u00ed\u0098\u00b8\u00ed\u0099\u0094 - AES-256-GCM)
# phone: \u00ec\u00a0\u0084\u00ed\u0099\u0094\u00eb\u00b2\u0088\u00ed\u0098\u00b8 (\u00ec\u0096\u0091\u00eb\u00b0\u00a9\u00ed\u0096\u00a5 \u00ec\u0095\u0094\u00ed\u0098\u00b8\u00ed\u0099\u0094 - AES-256-GCM)
# address: \u00ec\u00a3\u00bc\u00ec\u0086\u008c (\u00ec\u0096\u0091\u00eb\u00b0\u00a9\u00ed\u0096\u00a5 \u00ec\u0095\u0094\u00ed\u0098\u00b8\u00ed\u0099\u0094 - AES-256-GCM)
encryption.targets=email,phone,address
