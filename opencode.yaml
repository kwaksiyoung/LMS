project:
  name: egov-framework-4.2-project
  description: 전자정부프레임워크 4.2 LMS 개발 

models:
  default: anthropic/claude-haiku-4-5-20251001
  fallback: anthropic/claude-haiku-4-5-20251001

system_prompt: ./prompts/system.md

security:
  block:
    - application.properties
    
context:
  include:
    - src/main/java/**
    - src/main/resources/**
    - src/main/webapp/**
  exclude:
    - target/**
    - node_modules/**
    - .git/**

agents:
  - analyzer
  - architect
  - backend
  - db
  - frontend
  - reviewer

workflow:
  - analyzer
  - architect
  - backend
  - db
  - frontend
  - reviewer
